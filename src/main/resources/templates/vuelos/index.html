<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vuelos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/web/aerolineas}">SIV Web</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/web/aerolineas}">Aerolíneas</a>
            <a class="nav-link" th:href="@{/web/aeropuertos}">Aeropuertos</a>
            <a class="nav-link active" th:href="@{/web/vuelos}">Vuelos</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Lista de Vuelos</h2>
            <a class="btn btn-success btn-sm" th:href="@{/web/vuelos/crear}">Nuevo vuelo</a>
        </div>

        <div class="card-body">

            <div th:if="${success}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${#lists.isEmpty(vuelos)}" class="alert alert-warning mb-0">
                No hay vuelos registrados para mostrar.
            </div>

            <div th:unless="${#lists.isEmpty(vuelos)}" class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>Número</th>
                            <th>Aerolínea</th>
                            <th>Origen</th>
                            <th>Destino</th>
                            <th>Fecha</th>
                            <th>Hora salida</th>
                            <th>Hora llegada</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${vuelos}">
                            <td th:text="${v.id}"></td>
                            <td th:text="${v.numero}"></td>
                            <td th:text="${v.aerolineaNombre}"></td>
                            <td th:text="${v.origenNombre}"></td>
                            <td th:text="${v.destinoNombre}"></td>
                            <td th:text="${v.fecha}"></td>
                            <td th:text="${v.horaSalida}"></td>
                            <td th:text="${v.horaLlegada}"></td>
                            <td>
                                <a th:href="@{'/web/vuelos/editar/' + ${v.id}}" class="btn btn-warning btn-sm">Editar</a>
                                <a th:href="@{'/web/vuelos/eliminar/' + ${v.id}}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('¿Seguro que deseas eliminar este vuelo?');">
                                   Eliminar
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

</body>
</html>
