<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Vuelo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/web/aerolineas}">SIV Web</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/web/aerolineas}">Aerolíneas</a>
            <a class="nav-link" th:href="@{/web/aeropuertos}">Aeropuertos</a>
            <a class="nav-link active" th:href="@{/web/vuelos}">Vuelos</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h2 class="mb-0">Registrar Vuelo</h2>
        </div>
        <div class="card-body">

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/web/vuelos/crear}" th:object="${vuelo}" method="post">
                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Aerolínea</label>
                        <select class="form-select" th:field="*{aerolineaId}" required>
                            <option value="">Seleccione una aerolínea</option>
                            <option th:each="a : ${aerolineas}"
                                    th:value="${a.id}"
                                    th:text="${a.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Número de vuelo</label>
                        <input type="text" class="form-control" th:field="*{numeroVuelo}" required minlength="3">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Aeropuerto origen</label>
                        <select class="form-select" th:field="*{origenAeropuertoId}" required>
                            <option value="">Seleccione aeropuerto origen</option>
                            <option th:each="a : ${aeropuertos}"
                                    th:value="${a.id}"
                                    th:text="${a.nombre + ' (' + a.codigoIata + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Aeropuerto destino</label>
                        <select class="form-select" th:field="*{destinoAeropuertoId}" required>
                            <option value="">Seleccione aeropuerto destino</option>
                            <option th:each="a : ${aeropuertos}"
                                    th:value="${a.id}"
                                    th:text="${a.nombre + ' (' + a.codigoIata + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Fecha</label>
                        <input type="date" class="form-control" th:field="*{fechaVuelo}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Hora salida</label>
                        <input type="time" class="form-control" th:field="*{horaProgramadaSalida}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Hora llegada</label>
                        <input type="time" class="form-control" th:field="*{horaProgramadaLlegada}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Estado Vuelo ID</label>
                        <input type="number" class="form-control" th:field="*{estadoVueloId}" required min="1">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Fuente</label>
                        <input type="text" class="form-control" th:field="*{fuente}" required minlength="2">
                    </div>

                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-success">Guardar vuelo</button>
                    <a th:href="@{/web/vuelos}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>

        </div>
    </div>
</div>

<script>
    document.querySelector("form").addEventListener("submit", function (e) {
        const origen = document.querySelector("[name='origenAeropuertoId']").value;
        const destino = document.querySelector("[name='destinoAeropuertoId']").value;

        if (origen === destino) {
            e.preventDefault();
            alert("El aeropuerto origen y destino no pueden ser iguales.");
        }
    });
</script>

</body>
</html>
