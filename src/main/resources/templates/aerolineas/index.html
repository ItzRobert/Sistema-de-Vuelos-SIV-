<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aerolíneas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">SIV Web</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/web/aerolineas">Aerolíneas</a>
            <a class="nav-link" href="/web/aeropuertos">Aeropuertos</a>
            <a class="nav-link" href="/web/vuelos">Vuelos</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h2 class="mb-0">Lista de Aerolíneas</h2>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Código IATA</th>
                        <th>Nombre</th>
                        <th>Activa</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${aerolineas}">
                        <td th:text="${a.id}"></td>
                        <td th:text="${a.codigoIata}"></td>
                        <td th:text="${a.nombre}"></td>
                        <td>
                            <span th:if="${a.activa}" class="badge bg-success">Sí</span>
                            <span th:unless="${a.activa}" class="badge bg-danger">No</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
